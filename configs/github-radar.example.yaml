scoring:
  weights:
    star_velocity: 2.0
    star_acceleration: 3.0
    contributor_growth: 1.5
    pr_velocity: 1.0
    issue_velocity: 0.5

classification:
  ollama_endpoint: "http://10.0.0.185:11434"
  model: "qwen3:1.7b"
  timeout_ms: 30000
  max_readme_chars: 2000
  min_confidence: 0.6
  categories:
    # AI & ML
    - ai-agents
    - llm-tooling
    - ai-coding-assistants
    - mcp-ecosystem
    - ai-infrastructure
    - computer-vision
    - voice-and-audio-ai
    - mlops
    - vector-database
    - rag
    # Cloud-Native & Infrastructure
    - kubernetes
    - observability
    - cloud-native-security
    - networking
    - service-mesh
    - platform-engineering
    - gitops
    - infrastructure
    - container-runtime
    - wasm
    # Web & Frontend
    - web-frameworks
    - frontend-ui
    - css-and-styling
    # Mobile & Desktop
    - mobile-development
    - desktop-apps
    # Systems & Languages
    - rust-ecosystem
    - programming-languages
    - embedded-iot
    # Security
    - cybersecurity
    - privacy-tools
    # Data & Databases
    - databases
    - data-engineering
    - data-science
    # Productivity & Self-Hosted
    - self-hosted
    - cli-tools
    - productivity
    - low-code-automation
    # Developer Tools & Testing
    - developer-tools
    - testing
    # Game Dev & Creative
    - game-development
    - media-tools
    # Crypto & Web3
    - blockchain-web3
    # Robotics
    - robotics
    # Catch-all
    - other
  system_prompt: |
    You are a GitHub repository classifier for trending open-source projects across all technology domains.
    Classify into exactly ONE category from: {{.Categories}}
    Pick the most specific category that fits. Use "other" only if no category applies.
    Respond ONLY with JSON: {"category": "<name>", "confidence": <0.0-1.0>, "reasoning": "<one sentence>"}
  user_prompt: |
    Repository: {{.RepoName}}
    Description: {{.Description}}
    Language: {{.Language}}
    Topics: {{.Topics}}
    Stars: {{.Stars}} (trend: {{.StarTrend}})
    README excerpt:
    {{.Readme}}

exclusions:
  - example-org/example-repo

# Repositories to track with their categories
# If no categories specified, "default" is used
repositories:
  - repo: kubernetes/kubernetes
    categories:
      - cncf
      - container-orchestration
  - repo: prometheus/prometheus
    categories:
      - cncf
      - monitoring
  - repo: grafana/grafana
    categories:
      - monitoring
      - visualization
  # Repo without categories uses "default"
  - repo: open-telemetry/opentelemetry-go
